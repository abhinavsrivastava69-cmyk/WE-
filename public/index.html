<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageGram — PDF to Posts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">PageGram</h1>
        <p class="tagline">Books → Bite-sized Posts</p>
      </div>
    </header>

    <!-- Upload Section -->
    <section class="upload-section" id="uploadSection">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </div>
        <h2>Drop your PDF here</h2>
        <p>or click to browse</p>
        <p class="upload-hint">Books, newspapers, articles — up to 100MB</p>
        <input type="file" id="fileInput" accept=".pdf" hidden>
      </div>

      <!-- Processing indicator -->
      <div class="processing" id="processing" hidden>
        <div class="processing-spinner"></div>
        <h3 id="processingTitle">Reading your PDF...</h3>
        <p id="processingSubtitle">Extracting the good stuff</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </section>

    <!-- Filter Bar -->
    <section class="filter-bar" id="filterBar" hidden>
      <div class="filter-inner">
        <div class="source-info" id="sourceInfo"></div>
        <div class="filter-chips">
          <button class="chip active" data-filter="all">
            <span class="chip-icon">✦</span> All
          </button>
          <button class="chip" data-filter="funny">
            <span class="chip-icon">😄</span> Funny
          </button>
          <button class="chip" data-filter="learning">
            <span class="chip-icon">🧠</span> Learning
          </button>
          <button class="chip" data-filter="information">
            <span class="chip-icon">📰</span> Info
          </button>
        </div>
        <button class="new-upload-btn" id="newUploadBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New PDF
        </button>
      </div>
    </section>

    <!-- Feed -->
    <main class="feed" id="feed" hidden>
      <div class="feed-grid" id="feedGrid"></div>
    </main>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" hidden>
      <p>No posts match this filter</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
